<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja de Diamantes</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>💎 Loja de Diamantes</h1>
<p>One State RP</p>
</header>

<div class="container">

<div class="form">
<h2>Dados</h2>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="nick" placeholder="Nick">
<input type="text" id="idj" placeholder="ID">

<select id="pacote"></select>

<button id="btnPedido">Pedir pelo WhatsApp</button>
</div>

<div class="panel">
<h2>Pacote Selecionado</h2>
<p id="status">Nenhum</p>
</div>

<div class="grid" id="cards"></div>

<div class="hist">
<h2>Histórico</h2>

<button id="btnLimpar">Limpar Histórico</button>

<ul id="hist"></ul>

</div>

</div>

<footer>
© 2026 One State RP
</footer>

<script src="script.js"></script>

</body>
</html>
